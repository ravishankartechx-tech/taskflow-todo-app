<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --card: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6dfa;
      --accent2: #fa6d9a;
      --text: #f0f0f5;
      --muted: #7a7a90;
      --done-bg: #1a1f1a;
      --done-text: #4a5a4a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* BG glow blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,109,250,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(250,109,154,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      margin-bottom: 36px;
    }
    .header-tag {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #f0f0f5 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    /* STATS */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      flex: 1;
      text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* INPUT */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .input-row input {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      padding: 14px 20px;
      cursor: pointer;
      font-size: 20px;
      color: white;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .add-btn:hover { background: #9080ff; }
    .add-btn:active { transform: scale(0.95); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* TASK LIST */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s, background 0.2s;
    }
    .task-item:hover { border-color: #3a3a50; }
    .task-item.done {
      background: var(--done-bg);
      border-color: #222;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CHECKBOX */
    .checkbox {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }
    .checkbox:hover { border-color: var(--accent); }
    .task-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkmark { display: none; color: white; font-size: 12px; font-weight: 700; }
    .task-item.done .checkmark { display: block; }

    /* TASK TEXT */
    .task-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
      transition: color 0.2s;
      word-break: break-word;
    }
    .task-item.done .task-text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    /* DELETE */
    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--accent2); background: rgba(250,109,154,0.08); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* CLEAR DONE */
    .clear-btn {
      display: none;
      margin-top: 20px;
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .clear-btn.visible { display: block; }

    /* FOOTER */
    footer {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    footer span { color: var(--accent); }

    @media (max-width: 400px) {
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="header-tag">Stay Organized</div>
      <h1>TaskFlow</h1>
      <p class="subtitle">Your tasks, simplified.</p>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="pendingCount">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="doneCount">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="120"/>
      <button class="add-btn" onclick="addTask()" title="Add Task">＋</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="task-list" id="taskList"></div>

    <button class="clear-btn" id="clearBtn" onclick="clearDone()">🗑 Clear completed tasks</button>

    <footer>Built by <span>Ravi Shankar T</span> · TaskFlow v1.0</footer>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('taskflow_tasks')) || [];
    let currentFilter = 'all';

    const taskInput = document.getElementById('taskInput');
    const taskList  = document.getElementById('taskList');
    const clearBtn  = document.getElementById('clearBtn');

    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    function save() {
      localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) { taskInput.focus(); return; }
      tasks.unshift({ id: Date.now(), text, done: false });
      taskInput.value = '';
      save();
      render();
      taskInput.focus();
    }

    function toggleDone(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save(); render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function updateStats() {
      const total   = tasks.length;
      const done    = tasks.filter(t => t.done).length;
      const pending = total - done;
      document.getElementById('totalCount').textContent   = total;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('doneCount').textContent    = done;
      clearBtn.classList.toggle('visible', done > 0);
    }

    function render() {
      updateStats();
      const filtered = tasks.filter(t => {
        if (currentFilter === 'pending') return !t.done;
        if (currentFilter === 'done')    return t.done;
        return true;
      });

      if (filtered.length === 0) {
        const msgs = {
          all:     { icon: '📋', text: 'No tasks yet. Add something above!' },
          pending: { icon: '✅', text: 'No pending tasks. All done!' },
          done:    { icon: '🎯', text: 'No completed tasks yet.' },
        };
        const m = msgs[currentFilter];
        taskList.innerHTML = `<div class="empty"><div class="empty-icon">${m.icon}</div><div class="empty-text">${m.text}</div></div>`;
        return;
      }

      taskList.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <div class="checkbox" onclick="toggleDone(${t.id})">
            <span class="checkmark">✓</span>
          </div>
          <span class="task-text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
